<!DOCTYPE html>
<html lang="hi-IN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

  <!-- ═══ PWA META TAGS ═══ -->
  <title>VP Honda - Dealership Manager</title>
  <meta name="description" content="VP Honda Authorized Dealership Management - Bhopal" />
  <meta name="theme-color" content="#DC0000" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />

  <!-- Apple iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VP Honda" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

  <!-- Microsoft Tile -->
  <meta name="msapplication-TileColor" content="#DC0000" />
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

  <!-- Mobile web app -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="VP Honda" />

  <!-- Open Graph (for sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="VP Honda - Dealership Manager" />
  <meta property="og:description" content="VP Honda Authorized Dealership - Bhopal" />
  <meta property="og:image" content="/icons/icon-512x512.png" />

  <!-- Disable phone number auto-detection -->
  <meta name="format-detection" content="telephone=no" />

  <!-- Splash screen background -->
  <style>
    /* Initial loading state - matches PWA splash */
    body {
      margin: 0;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #root:empty::before {
      content: '';
      display: block;
      width: 120px;
      height: 120px;
      margin: 30vh auto 20px;
      background: url('/icons/icon-192x192.png') center/contain no-repeat;
      animation: vp-pulse 1.5s ease-in-out infinite;
    }
    #root:empty::after {
      content: 'VP Honda लोड हो रहा है...';
      display: block;
      text-align: center;
      color: white;
      font-size: 14px;
      letter-spacing: 1px;
    }
    @keyframes vp-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <div style="text-align:center; padding:50px; color:white;">
      ⚠️ इस app के लिए JavaScript चाहिए. कृपया browser settings में enable करें.
    </div>
  </noscript>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
